<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
		<form method = "post">
			<label for= "name">Name</label>
			<input type = "text" placeholder = "Name" id = "name" required><br>
			<label for= "email">Email</label>
			<input type = "Email" placeholder = "Email" id = "email" required><br>

			<label>Gender</label><br>

			<input type="radio" id="gender_m" name="gender" value="male" required>
			<label for="gender_m">Male</label><br>

			<input type="radio" id="gender_f" name="gender" value="female" required>
			<label for="gender_f">Female</label><br>

			<label for ="cars">Car Brands</label>
			<select placeholder= "--Please choose an option--" id ="cars" required >
				<option>BMW</option>
				<option>SWIFT</option>
				<option>RANGE ROVER</option>
			</select><br>

			<label for= "age">Age</label>
			<input type = "number" placeholder = "Age" id = "age" required><br>

			<label for= "dob">DOB</label>
			<input type = "date" id = "dob" required><br>

			<label for= "tel">Phone Number</label>
			<input type = "tel" placeholder = "xxx-xxx-xxxx" id = "tel"><br>

			<label for= "password">Password</label>
			<input type = "password" placeholder = "Password" id = "password" required><br>

			<label for= "tos">I agree to the TOS</label>
			<input type = "checkbox" id = "tos" required><br>

			<button type ="submit">
		</form>
		</form>

		
	    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
